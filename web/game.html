<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>A Field Guide to Being Human — Run</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0D0D0D; overflow: hidden; font-family: 'IBM Plex Sans', sans-serif; }
    canvas { display: block; }
    #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
    #score { position: absolute; top: 1rem; left: 1rem; color: #DAA520; font-size: 1.2rem; font-weight: 600; }
    #start-screen, #hit-screen { 
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      pointer-events: all; color: #E8E8E8; text-align: center; padding: 2rem;
    }
    #start-screen h1 { font-size: 1.4rem; font-weight: 500; margin-bottom: 0.5rem; }
    #start-screen p { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }
    #start-screen .tap { font-size: 1rem; color: #DAA520; animation: pulse 1.5s infinite; }
    #hit-screen { display: none; background: #0D0D0D; overflow-y: auto; z-index: 20; }
    #hit-screen h2 { font-size: 1.2rem; font-weight: 500; margin-bottom: 0.8rem; }
    #hit-screen .story { font-size: 0.9rem; color: #BBB; margin-bottom: 1.5rem; max-width: 540px; line-height: 1.7; text-align: left; white-space: pre-line; }
    #hit-screen .situation { font-size: 0.95rem; color: #CCC; margin-bottom: 1.5rem; max-width: 500px; line-height: 1.6; }
    #hit-screen .options { display: flex; flex-direction: column; gap: 0.5rem; max-width: 500px; width: 100%; }
    #hit-screen .opt {
      padding: 0.8rem 1rem; border: 1px solid #333; background: #1A1A1A; color: #E8E8E8;
      font-family: inherit; font-size: 0.9rem; text-align: left; cursor: pointer; border-radius: 3px; line-height: 1.4;
    }
    #hit-screen .opt:hover { border-color: #666; }
    #hit-screen .opt.correct { border-color: #4CAF50; background: rgba(76,175,80,0.1); }
    #hit-screen .opt.wrong { border-color: #E53935; background: rgba(229,57,53,0.1); }
    #hit-screen .feedback { margin-top: 1rem; font-size: 0.85rem; color: #AAA; max-width: 500px; line-height: 1.5; }
    #hit-screen .continue { margin-top: 1.5rem; padding: 0.6rem 1.5rem; background: #DAA520; color: #000; border: none; font-family: inherit; font-weight: 600; cursor: pointer; border-radius: 3px; display: none; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="ui">
    <div id="score" style="display:none">★ 0</div>
    <div id="start-screen">
      <h1>A Field Guide to Being Human</h1>
      <p>Run. Jump. Hit obstacles. Learn.</p>
      <span class="tap">Tap or Space to Start</span>
    </div>
    <div id="hit-screen">
      <h2 id="hit-title"></h2>
      <p class="situation" id="hit-situation"></p>
      <button class="continue" id="hit-go" style="display:inline-block">Read & Solve →</button>
    </div>
  </div>
  <script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// --- Chapters data (obstacles) ---
const chapters = [
  {
    title: "Resisting Change",
    story: "Five monkeys in a cage. A banana at the top of a ladder. Every time one climbs, all five get sprayed with cold water.\n\nSoon no monkey climbs. Then one is replaced. The new monkey reaches for the banana — the others pull it down. Hard.\n\nOne by one, all are replaced. No monkey has ever been sprayed. But none will climb.\n\nNone know why. \"That's how it's always been done here.\"",
    situation: "Your team won't adopt the new process. You've shown them the data three times.",
    options: [
      { text: "Show even more data", correct: false, fb: "You're arguing with emotion using reason." },
      { text: "Acknowledge what they're losing first", correct: true, fb: "Naming the loss opens the door. People don't resist change — they resist loss." },
      { text: "Escalate to leadership", correct: false, fb: "Forced change hardens resistance into identity." }
    ]
  },
  {
    title: "Hidden Motives",
    story: "In the Indian epic Mahabharata, there's a character named Shakuni — the uncle who smiles at everyone while secretly orchestrating war.\n\nHe never raises his voice. He never threatens. He plays dice. And wins everything through the gap between what people say and what they actually want.\n\nThe lesson: watch the dice, not the smile.",
    situation: "A coworker publicly supports the project but privately undermines it in 1:1s.",
    options: [
      { text: "Confront them in front of others", correct: false, fb: "Public confrontation triggers ego defense — they'll deny and double down." },
      { text: "Watch what they do, not what they say", correct: true, fb: "Actions reveal incentives. Words reveal image. The gap between them is where the truth lives." },
      { text: "Ignore it — maybe you're wrong", correct: false, fb: "Ignoring patterns doesn't make them disappear. It just gives them more room." }
    ]
  },
  {
    title: "Nobody Owns It",
    story: "In 1964, Kitty Genovese was attacked outside her apartment. 38 neighbors heard her screams. No one called the police.\n\nNot because they were cruel. Because each one thought: someone else will do it.\n\nThis is the bystander effect. The more people present, the less responsible each person feels. Ownership diffuses until it vanishes.",
    situation: "A critical bug is reported. Everyone agrees it's important. No one fixes it.",
    options: [
      { text: "Send another email to the group", correct: false, fb: "Diffusion of responsibility: if everyone owns it, no one does." },
      { text: "Assign one specific person with a deadline", correct: true, fb: "Ownership needs a name and a date. Not a group and a hope." },
      { text: "Fix it yourself every time", correct: false, fb: "You become the single point of failure. The system never learns." }
    ]
  },
  {
    title: "The Ego Trap",
    story: "Abraham Lincoln would write furious letters to generals who failed him — then never send them. He called them his 'hot letters.'\n\nHe knew: the satisfaction of being right lasts a moment. The damage of proving it lasts much longer.\n\nThe hardest words to say — 'I was wrong' — are often the most powerful.",
    situation: "You realize mid-argument that you're wrong. But backing down feels impossible.",
    options: [
      { text: "Double down — find any angle to be right", correct: false, fb: "Winning the argument, losing the relationship and your credibility." },
      { text: "Say 'I think I was wrong about that'", correct: true, fb: "Admitting error is strength. It builds trust faster than being right ever could." },
      { text: "Change the subject quietly", correct: false, fb: "Avoidance isn't resolution. The other person notices." }
    ]
  },
  {
    title: "Fear of Incompetence",
    story: "Maya Angelou wrote 11 books, won multiple awards, and was nominated for a Pulitzer. She once said:\n\n'I've written eleven books but each time I think: they're going to find out now. I've run a game on everybody.'\n\nIf she felt this way after 11 books — maybe the feeling isn't a signal that you're fake. Maybe it's just what growth feels like.",
    situation: "You're asked a question in a meeting you don't know the answer to. Everyone's watching.",
    options: [
      { text: "Make up something plausible", correct: false, fb: "Faking expertise erodes trust the moment it's discovered." },
      { text: "Say 'I don't know — let me find out and get back to you'", correct: true, fb: "Honest gaps + follow-through builds more credibility than bluffing ever could." },
      { text: "Deflect to someone else", correct: false, fb: "Redirecting every time signals avoidance, not leadership." }
    ]
  }
];

// --- Game State ---
let W, H, ground;
let state = 'start'; // start, running, hit
let speed = 3;
let distance = 0;
let score = 0;
let player = { x: 80, y: 0, vy: 0, w: 20, h: 50, jumping: false };
let obstacles = [];
let nextObstacle = 500;
let currentChapter = 0;
let stars = [];

// --- Resize ---
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  ground = H - 80;
  player.y = ground - player.h;
}
window.addEventListener('resize', resize);
resize();

// --- Input ---
function jump() {
  if (state === 'start') { startGame(); return; }
  if (state !== 'running') return;
  if (!player.jumping) {
    player.vy = -15;
    player.jumping = true;
  }
}
window.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); jump(); } });
canvas.addEventListener('click', jump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, { passive: false });

// --- Start ---
function startGame() {
  state = 'running';
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('score').style.display = 'block';
  speed = 3;
  distance = 0;
  score = 0;
  obstacles = [];
  nextObstacle = 500;
  currentChapter = 0;
  stars = [];
}

// --- Spawn Obstacle ---
function spawnObstacle() {
  const types = ['wall', 'tall', 'double'];
  const type = types[Math.floor(Math.random() * types.length)];
  let o = { x: W + 50, type, chapter: currentChapter % chapters.length };

  if (type === 'wall') { o.w = 30; o.h = 50; o.y = ground - 50; }
  else if (type === 'tall') { o.w = 25; o.h = 80; o.y = ground - 80; }
  else { o.w = 50; o.h = 40; o.y = ground - 40; }

  obstacles.push(o);
  nextObstacle = 600 + Math.random() * 400;
}

// --- Collision ---
function checkCollision(o) {
  return player.x + player.w > o.x && player.x < o.x + o.w &&
         player.y + player.h > o.y;
}

// --- Hit Obstacle → Show Chapter ---
function hitObstacle(o) {
  state = 'hit';
  const ch = chapters[o.chapter];
  document.getElementById('hit-title').textContent = ch.title;
  document.getElementById('hit-situation').textContent = ch.situation;
  document.getElementById('hit-screen').style.display = 'flex';

  document.getElementById('hit-go').onclick = () => {
    localStorage.setItem('gameProgress', JSON.stringify({ distance, score, currentChapter: o.chapter }));
    window.location.href = 'index.html?from=game&chapter=' + o.chapter;
  };
}

function answerQuiz(ch, idx) {
  const opt = ch.options[idx];
  const btns = document.querySelectorAll('#hit-options .opt');
  btns.forEach((b, i) => {
    b.onclick = null;
    b.style.opacity = '0.5';
    if (ch.options[i].correct) b.classList.add('correct');
    if (i === idx && !opt.correct) b.classList.add('wrong');
  });
  document.getElementById('hit-feedback').textContent = opt.feedback;
  if (opt.correct) {
    score++;
    document.getElementById('score').textContent = '★ ' + score;
    document.getElementById('hit-continue').style.display = 'inline-block';
  } else {
    setTimeout(() => {
      btns.forEach(b => { b.classList.remove('wrong'); b.style.opacity = '1'; b.onclick = () => answerQuiz(ch, Array.from(btns).indexOf(b)); });
      document.getElementById('hit-feedback').textContent = opt.feedback + ' Try again.';
    }, 1500);
  }
}

// (hit-continue removed — now using hit-go button with inline onclick)

// --- Draw Stick Figure ---
function drawPlayer() {
  const x = player.x + player.w / 2;
  const y = player.y + player.h;
  ctx.strokeStyle = '#FFF';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  
  // Head
  ctx.beginPath();
  ctx.arc(x, y - 45, 8, 0, Math.PI * 2);
  ctx.stroke();
  
  // Body
  ctx.beginPath();
  ctx.moveTo(x, y - 37);
  ctx.lineTo(x, y - 15);
  ctx.stroke();
  
  // Legs (running animation)
  const legAngle = Math.sin(distance * 0.15) * 0.4;
  ctx.beginPath();
  ctx.moveTo(x, y - 15);
  ctx.lineTo(x - 8 + Math.sin(legAngle) * 8, y);
  ctx.moveTo(x, y - 15);
  ctx.lineTo(x + 8 - Math.sin(legAngle) * 8, y);
  ctx.stroke();
  
  // Arms
  const armAngle = Math.sin(distance * 0.15 + Math.PI) * 0.3;
  ctx.beginPath();
  ctx.moveTo(x, y - 30);
  ctx.lineTo(x + 10 + Math.sin(armAngle) * 5, y - 22);
  ctx.moveTo(x, y - 30);
  ctx.lineTo(x - 10 - Math.sin(armAngle) * 5, y - 22);
  ctx.stroke();
}

// --- Draw Obstacle ---
function drawObstacle(o) {
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 2;
  ctx.strokeRect(o.x, o.y, o.w, o.h);
  // X pattern for visual interest
  ctx.beginPath();
  ctx.moveTo(o.x, o.y);
  ctx.lineTo(o.x + o.w, o.y + o.h);
  ctx.moveTo(o.x + o.w, o.y);
  ctx.lineTo(o.x, o.y + o.h);
  ctx.stroke();
}

// --- Draw Stars (collected) ---
function drawStars() {
  stars = stars.filter(s => s.alpha > 0);
  stars.forEach(s => {
    s.y -= 1;
    s.alpha -= 0.02;
    ctx.fillStyle = `rgba(218, 165, 32, ${s.alpha})`;
    ctx.font = '20px sans-serif';
    ctx.fillText('★', s.x, s.y);
  });
}

// --- Game Loop ---
function update() {
  if (state !== 'running') return;

  // Player physics
  player.vy += 0.8; // gravity
  player.y += player.vy;
  if (player.y >= ground - player.h) {
    player.y = ground - player.h;
    player.vy = 0;
    player.jumping = false;
  }

  // Move obstacles
  obstacles.forEach(o => o.x -= speed);
  obstacles = obstacles.filter(o => o.x + o.w > -50);

  // Spawn
  distance += speed;
  if (obstacles.length === 0 || (W - obstacles[obstacles.length - 1].x) > nextObstacle) {
    spawnObstacle();
  }

  // Collision
  for (const o of obstacles) {
    if (checkCollision(o)) {
      hitObstacle(o);
      stars.push({ x: player.x, y: player.y, alpha: 1 });
      return;
    }
  }

  // Speed increase (very gradual)
  speed = 3 + Math.min(distance / 2000, 2);
}

function render() {
  ctx.fillStyle = '#0D0D0D';
  ctx.fillRect(0, 0, W, H);

  // Ground line
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, ground);
  ctx.lineTo(W, ground);
  ctx.stroke();

  // Ground dots (moving)
  ctx.fillStyle = '#222';
  for (let i = 0; i < W; i += 40) {
    const dx = (i - distance * 0.5) % W;
    ctx.fillRect((dx + W) % W, ground + 15, 2, 2);
  }

  // Obstacles
  obstacles.forEach(drawObstacle);

  // Player
  drawPlayer();

  // Stars
  drawStars();
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

// --- Auto-resume if returning from chapter page ---
const gameParams = new URLSearchParams(window.location.search);
if (gameParams.get('resume') === '1') {
  const progress = JSON.parse(localStorage.getItem('gameProgress') || '{}');
  score = progress.score || 0;
  currentChapter = progress.currentChapter || 0;
  document.getElementById('score').textContent = '★ ' + score;
  startGame();
}

loop();
  </script>
</body>
</html>
