<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Favicon - diagonal insight pattern -->
  <!-- Dark rounded background -->
  <rect width="64" height="64" rx="12" fill="#16140f"/>

  <!-- Row 1 -->
  <rect x="8"  y="8"  width="14" height="14" rx="3" fill="#B8860B"/>
  <rect x="25" y="8"  width="14" height="14" rx="3" fill="#FAF7F2" opacity="0.12"/>
  <rect x="42" y="8"  width="14" height="14" rx="3" fill="#FAF7F2" opacity="0.18"/>

  <!-- Row 2 -->
  <rect x="8"  y="25" width="14" height="14" rx="3" fill="#FAF7F2" opacity="0.15"/>
  <rect x="25" y="25" width="14" height="14" rx="3" fill="#B8860B"/>
  <rect x="42" y="25" width="14" height="14" rx="3" fill="#FAF7F2" opacity="0.12"/>

  <!-- Row 3 -->
  <rect x="8"  y="42" width="14" height="14" rx="3" fill="#FAF7F2" opacity="0.18"/>
  <rect x="25" y="42" width="14" height="14" rx="3" fill="#FAF7F2" opacity="0.10"/>
  <rect x="42" y="42" width="14" height="14" rx="3" fill="#B8860B"/>
</svg>
